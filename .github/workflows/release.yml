name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Run tests
        run: go test ./...

      - name: Build linux/amd64
        env:
          CGO_ENABLED: "0"
          GOOS: linux
          GOARCH: amd64
        run: go build -ldflags="-s -w -X main.versionStr=${{ github.ref_name }}" -o sistemo-linux-amd64 ./cmd/sistemo

      - name: Build linux/arm64
        env:
          CGO_ENABLED: "0"
          GOOS: linux
          GOARCH: arm64
        run: go build -ldflags="-s -w -X main.versionStr=${{ github.ref_name }}" -o sistemo-linux-arm64 ./cmd/sistemo

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            sistemo-linux-amd64
            sistemo-linux-arm64
          generate_release_notes: true
